<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <title>SHUNSKATING · 瞬</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">

    <!-- fontes do google (serão hospedadas localmente na Fase 10) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Special+Elite&family=JetBrains+Mono:wght@400;500;700&family=Permanent+Marker&display=swap" rel="stylesheet">

    <!-- css em ordem de dependência -->
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/zine-effects.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/screens/home.css">

    <link rel="stylesheet" href="css/screens/music.css">
</head>
<body>
    <!-- overlay de grão de filme global -->
    <div class="grain-overlay" aria-hidden="true"></div>

    <!-- número da edição (canto superior direito, estilo zine) -->
    <div class="page-marker" id="page-marker" aria-hidden="true">// pg. 01 //</div>

    <!-- container principal onde as telas são renderizadas -->
    <main id="app" role="main"></main>

    <!-- bottom navigation (renderizado via JS, mas com skeleton aqui pra evitar flash) -->
    <nav class="bottom-nav" id="bottom-nav" role="navigation" aria-label="Navegação principal"></nav>

    <!-- toolbar flutuante de highlights (fica escondida, aparece em seleção de texto) -->
    <div class="highlight-toolbar" id="highlight-toolbar" role="toolbar" aria-label="Ferramentas de destaque" hidden></div>

    <!-- scripts como módulos -->
    <!-- QR code generator (kazuhikoarase, MIT). Local, offline. -->
    <script src="js/vendor/qrcode-generator.js"></script>
    <script type="module" src="js/app.js"></script>
    <!-- jsQR: lib pra ler QR code via câmera. CDN permite cache offline depois do primeiro load. -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js" defer></script>
</body>
</html>
